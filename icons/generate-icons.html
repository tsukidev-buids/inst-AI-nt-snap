<!DOCTYPE html>
<html>
<head><title>inst-ai-nt snap — icon generator</title></head>
<body style="background:#111;color:#eee;font-family:monospace;padding:40px;">
<p>open in browser, right-click each canvas → "save image as" for the PNGs.</p>
<p>16x16:</p><canvas id="c16" width="16" height="16"></canvas>
<p>48x48:</p><canvas id="c48" width="48" height="48"></canvas>
<p>64x64:</p><canvas id="c64" width="64" height="64"></canvas>
<p>128x128:</p><canvas id="c128" width="128" height="128"></canvas>
<p>512x512 (ko-fi / marketing):</p><canvas id="c512" width="512" height="512"></canvas>

<script>
const svgSource = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect x="4" y="4" width="120" height="120" rx="20" fill="#18181c"/>
  <rect x="4" y="4" width="120" height="120" rx="20" fill="none" stroke="#2a2a30" stroke-width="2"/>
  <g transform="rotate(-2, 64, 64)">
    <rect x="28" y="22" width="72" height="88" rx="3" fill="#faf8f3"/>
    <rect x="34" y="28" width="60" height="60" rx="2" fill="#1b1b1f"/>
    <g transform="translate(64, 55)" fill="#f5e6c8" opacity="0.8">
      <polygon points="0,-6 5,-15 11,-11"/>
      <polygon points="5.2,3 14.5,-3.5 13,4"/>
      <polygon points="5.2,3 9.5,13 3,11"/>
      <polygon points="0,6 -5,15 -11,11"/>
      <polygon points="-5.2,-3 -14.5,3.5 -13,-4"/>
      <polygon points="-5.2,-3 -9.5,-13 -3,-11"/>
    </g>
    <circle cx="64" cy="55" r="18" fill="none" stroke="#f5e6c8" stroke-width="2.5" opacity="0.65"/>
    <circle cx="64" cy="55" r="3.5" fill="#f5e6c8" opacity="0.7"/>
  </g>
  <g transform="translate(94, 10)">
    <polygon points="5,0 0,9 4,9 -1,20 9,8 5,8 9,0" fill="#f5e6c8" opacity="0.95"/>
  </g>
</svg>`;

function renderToCanvas(canvasId) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const size = canvas.width;

  const img = new Image();
  const blob = new Blob([svgSource], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);

  img.onload = () => {
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

renderToCanvas('c16');
renderToCanvas('c48');
renderToCanvas('c64');
renderToCanvas('c128');
renderToCanvas('c512');
</script>
</body>
</html>
